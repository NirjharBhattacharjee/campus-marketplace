<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Listings · Campus Marketplace</title>
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/custom.css" rel="stylesheet" />
  </head>
  <body class="bg-body-tertiary">
    <!-- Shared navigation bar -->
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">Campus Marketplace</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMain"
          aria-controls="navMain"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="marketplace.html">Marketplace</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="myListing.html">My Listings</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="shortlist.html">Shortlist</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-3">
            <span class="navbar-text" id="user-email"></span>
            <button class="btn btn-outline-light signout-btn" type="button">
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="h3 mb-1">My Listings</h1>
      <p class="text-secondary">Items you have listed for sale or trade.</p>

      <!-- Loading / empty message -->
      <div id="status" class="text-secondary py-5 text-center">Loading your listings…</div>

      <!-- Items grid (filled dynamically from Firestore) -->
      <div id="items-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
    </main>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/myListing.js"></script>
  </body>
</html>
