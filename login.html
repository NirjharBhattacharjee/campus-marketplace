<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In · Campus Marketplace</title>
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/custom.css" rel="stylesheet" />
  </head>
  <body class="bg-body-tertiary">
    <main class="min-vh-100 d-flex align-items-center justify-content-center p-3">
      <div class="card shadow-sm w-100" style="max-width: 24rem">
        <div class="card-body p-4">
          <h1 class="h4 text-center mb-1">Campus Marketplace</h1>
          <p class="text-center text-secondary mb-4">Sign in to continue</p>

          <!-- Error message (hidden until sign-in fails) -->
          <div
            id="login-error"
            class="alert alert-danger d-none"
            role="alert"
          ></div>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label for="login-email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="login-email"
                placeholder="you@students.mq.edu.au"
                required
                autocomplete="username"
              />
            </div>
            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="login-password"
                required
                autocomplete="current-password"
              />
            </div>
            <button
              type="submit"
              id="login-submit"
              class="btn btn-primary w-100"
            >
              Sign In
            </button>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
